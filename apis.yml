name: Reclaim.ai
description: AI-powered scheduling platform with a REST API for managing tasks, habits,
  meeting buffers, and automatically optimizing calendar time for deep work and meetings.
  Reclaim integrates with Google Calendar and Outlook to protect focus time, improve
  meeting quality, and provide workforce scheduling analytics.

            application/json:
              schema:
                nullable: true
      security:
      - Authorization: []
    patch:
      tags:
      - assist
      operationId: patch
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: notificationKey
        in: query

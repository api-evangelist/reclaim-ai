      operationId: promoteProactiveGtd
      parameters:
      - name: type
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ProactiveGtdScope.Type'
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInteractionResponse'
      security:
      - Authorization: []
  /api/interactions/proactive-gtd/tasks:
    get:
      tags:
      - interactions
      operationId: proactiveGtdTasks
      parameters:
      - name: type
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ProactiveGtdScope.Type'
      responses:
        '200':
          description: proactiveGtdTasks 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProactiveGtdTasks'
      security:
      - Authorization: []
  /api/interactions/recommendations/promote:
    post:
      tags:
      - interactions
      operationId: promoteRecommendations
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInteractionResponse'
      security:
      - Authorization: []
  /api/interactions/records:
    get:
      tags:
      - interactions
      operationId: listRecords
      parameters:
      - name: start
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: end
        in: query
        required: true
        schema:
          type: string
          format: date-time
      - name: expand
        in: query
        schema:
          type: boolean
          nullable: true
      responses:
        '200':
          description: listRecords 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InteractionRecordView'

openapi: 3.0.1
info:
  title: Reclaim account-time-schemes interactions API
  description: Reclaim's awesome API
  contact:
    name: Reclaim.ai Inc.
    url: http://reclaim.ai
    email: info@reclaim.ai
  license:
    name: Reclaim 9.9
    url: http://reclaim.ai
  version: '0.1'
tags:
- name: interactions
paths:
  /api/interactions:
    get:
      tags:
      - interactions
      operationId: listSessions
      parameters:
      - name: expand
        in: query
        schema:
          type: boolean
          nullable: true
      responses:
        '200':
          description: listSessions 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InteractionSessionView'
      security:
      - Authorization: []
    post:
      tags:
      - interactions
      operationId: interact
      parameters:
      - name: notificationKey
        in: query
        schema:
          type: string
          nullable: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                request:
                  $ref: '#/components/schemas/SessionInteractionRequest'
        required: true
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInteractionResponse'
      security:
      - Authorization: []
  /api/interactions/apply:

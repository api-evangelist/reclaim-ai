      - Authorization: []
  /api/interactions/task/{compoundKey}:
    get:
      tags:
      - interactions
      operationId: getGtdTask
      parameters:
      - name: compoundKey
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: getGtdTask 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GtdTask'
      security:
      - Authorization: []
  /api/interactions/update:
    post:
      tags:
      - interactions
      operationId: update_1
      parameters:
      - name: notificationKey
        in: query
        schema:
          type: string
          nullable: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                request:
                  $ref: '#/components/schemas/SessionInteractionRequest'

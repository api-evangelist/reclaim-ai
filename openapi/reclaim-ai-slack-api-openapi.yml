openapi: 3.0.1
info:
  title: Reclaim account-time-schemes slack API
  description: Reclaim's awesome API
  contact:
    name: Reclaim.ai Inc.
    url: http://reclaim.ai
    email: info@reclaim.ai
  license:
    name: Reclaim 9.9
    url: http://reclaim.ai
  version: '0.1'
tags:
- name: slack
paths:
  /api/slack/action-endpoint:
    post:
      tags:
      - slack
      operationId: actionEndpoint
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
  /api/slack/add:
    get:
      tags:
      - slack
      operationId: slackRedirect
      parameters:
      - name: scope
        in: query
        schema:
          type: string
          nullable: true
      - name: bot
        in: query
        schema:
          type: string
          nullable: true
      - name: userScopes
        in: query
        schema:
          type: string
          nullable: true
      - name: teamId
        in: query
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
  /api/slack/command:
    post:
      tags:
      - slack
      operationId: command
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
  /api/slack/connect:
    get:
      tags:
      - slack
      operationId: connect
      parameters:
      - name: code
        in: query
        schema:
          type: string
          nullable: true
      - name: error
        in: query
        schema:
          type: string
          nullable: true
      - name: state
        in: query
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
  /api/slack/integrations:
    get:
      tags:
      - slack
      operationId: get_4
      responses:
        '200':
          description: get_4 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlackSettingsView'
      security:
      - Authorization: []
    put:
      tags:
      - slack
      operationId: put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SlackSettingsView'
        required: true
      responses:
        '200':
          description: put 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlackSettingsView'
      security:
      - Authorization: []
  /api/slack/interactive-endpoint:
    post:
      tags:
      - slack
      operationId: interactiveEndpoint
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
  /api/slack/link:
    post:
      tags:
      - slack
      operationId: link
      parameters:
      - name: teamId
        in: query
        required: true
        schema:
          type: string
      - name: userId
        in: query
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                user:
                  $ref: '#/components/schemas/User'
        required: true
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
      security:
      - Authorization: []
  /api/slack/options-load-endpoint:
    post:
      tags:
      - slack
      operationId: optionsLoadEndpoint
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OptionsLoadEndpointRequest'
        required: true
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
  /api/slack/streamlined-connect:
    get:
      tags:
      - slack
      operationId: streamlinedConnect
      parameters:
      - name: code
        in: query
        schema:
          type: string
          nullable: true
      - name: error
        in: query
        schema:
          type: string
          nullable: true
      - name: state
        in: query
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
  /api/slack/streamlined-init:
    get:
      tags:
      - slack
      operationId: streamLinedRedirect
      parameters:
      - name: slackTeamId
        in: query
        schema:
          type: string
          nullable: true
      - name: slackUserId
        in: query
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: OK response
          content:
            application/json:
              schema:
                nullable: true
components:
  schemas:
    DefaultRsvpAvailability:
      type: object
      properties:
        treatNeedsActionRsvpAs:
          $ref: '#/components/schemas/AvailabilityType'
    SchedulingWindowWeeks:
      type: string
      enum:
      - ONE
      - TWO
      - THREE
      - FOUR
      - FIVE
      - SIX
      - SEVEN
      - EIGHT
      - NINE
      - TEN
      - ELEVEN
      - TWELVE
    WebhookSettings:
      type: object
      properties:
        enabled:
          type: boolean
        all:
          $ref: '#/components/schemas/WebhookSettings'
    CalendarSlackSettingsView:
      required:
      - calendarId
      - setting
      type: object
      properties:
        calendarId:
          type: integer
          format: int64
        setting:
          $ref: '#/components/schemas/NotificationSetting'
    UserInterests:
      type: object
      properties:
        tasks:
          type: boolean
        priorities:
          type: boolean
        office365:
          type: boolean
        calendar:
          type: boolean
        asana:
          type: boolean
        trello:
          type: boolean
        todoist:
          type: boolean
        jira:
          type: boolean
        linear:
          type: boolean
        clickup:
          type: boolean
        monday:
          type: boolean
        MSTeams:
          type: boolean
    AvailabilitySettings:
      type: object
      properties:
        redisCacheEnabled:
          type: boolean
    UserProfileDepartment:
      type: string
      enum:
      - PRODUCT
      - ENGINEERING
      - SUPPORT
      - MARKETING
      - SALES
      - DESIGN
      - HR
      - OPERATIONS
      - ACCOUNTING_AND_FINANCE
      - FOUNDER
      - EXECUTIVE_ASSISTANT
      - IT_SECURITY
      - OTHER
      x-deprecated:
      - OTHER
    Colorized:
      type: object
      properties:
        color:
          $ref: '#/components/schemas/EventColor'
    TaskAutoWorkflowSettings:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/TaskAutoWorkflowType'
        durationToWaitInDays:
          type: integer
          format: int32
    AsanaSettings:
      type: object
      properties:
        enabled:
          type: boolean
    SlackSettingsView:
      required:
      - calendarSettings
      type: object
      properties:
        calendarSettings:
          minItems: 1
          type: array
          items:
            $ref: '#/components/schemas/CalendarSlackSettingsView'
    TimezonePreference:
      type: string
      enum:
      - USE_PRIMARY_CALENDAR_TZ
      - USE_RECLAIM_TZ
    UserProvisioningDetails:
      required:
      - hasTeamProvisionedMetadata
      type: object
      properties:
        hasTeamProvisionedMetadata:
          type: boolean
    UserMetadataUsecase:
      type: string
      enum:
      - EDUCATION
      - WORK
      - NON_PROFIT
      - TEAM
      - SOLO_WORK
      - PERSONAL
      x-deprecated:
      - EDUCATION
      - NON_PROFIT
    ExperimentalSettings:
      type: object
      properties:
        treatOptionalSmartMeetingAttendeesAsFree:
          type: boolean
        lookAheadForSmartMeetingIdealDayOnWeeklyMeetings:
          type: boolean
    PrioritiesSettings:
      type: object
      properties:
        enabled:
          type: boolean
    EventDisplayPreferences:
      required:
      - attribution
      - busyEmoji
      - description
      - doneEmoji
      - freeEmoji
      - lockEmoji
      - prefix
      - progressEmoji
      - warningEmoji
      type: object
      properties:
        progressEmoji:
          type: boolean
        lockEmoji:
          type: boolean
        freeEmoji:
          type: boolean
        busyEmoji:
          type: boolean
        doneEmoji:
          type: boolean
        warningEmoji:
          type: boolean
        description:
          type: boolean
        attribution:
          type: boolean
        prefix:
          type: boolean
    SchedulingWindowWeeksOverride:
      type: string
      enum:
      - ONE
      - TWO
      - THREE
      - FOUR
      - FIVE
      - SIX
      - SEVEN
      - EIGHT
      - NINE
      - TEN
      - ELEVEN
      - TWELVE
    UserAccountLock.AccountLockType:

    HabitCreateRequestFields:
      required:
      - commonData
      - eventMatcher
      - minDurationMinutes
      - noAvailabilityAction
      - proactivelyUseIdealTime
      - timePolicy
      type: object
      properties:
        commonData:
          $ref: "#/components/schemas/SchedulePolicyCommonDataCreateRequestFields"
        eventMatcher:
          $ref: "#/components/schemas/EventMatcher"
        idealDurationMinutes:
          type: integer
          description: "Preferred duration in minutes. Reclaim tries this first, falling\
            \ back to minDurationMinutes."
          format: int64
        minDurationMinutes:
          type: integer
          description: Minimum acceptable duration in minutes.
          format: int64
        availableTimeForTransparencyChangeMinutes:
          type: integer
          description: Minutes before event start to switch the calendar entry from
            free to busy. Null keeps the event busy from creation.
          format: int64
        availableSlotsForTransparencyChange:
          type: integer
          description: Number of alternative time slots to hold as free before committing
            to one. Null means only the best slot is held.
          format: int64
        autoBusyBeforeStartMinutes:
          type: integer
          description: "Minutes before start to force the event to show as busy, even\
            \ if other slots are still held. Null disables."
          format: int64
        timePolicy:
          $ref: "#/components/schemas/SchedulePolicyTimePolicy"
        proactivelyUseIdealTime:
          type: boolean
          description: "When true, Reclaim proactively schedules at the ideal duration\
            \ even when no conflict forces rescheduling."
        noAvailabilityAction:
          description: "What to do when no available slot exists: CANCEL (remove the\
            \ event) or WARNING (keep it and surface a warning)."
          allOf:
          - $ref: "#/components/schemas/ManagedEventNoAvailabilityAction"
        suppressWarnings:
          type: boolean
          description: "When true, suppresses all warnings/problems detected by this\
            \ policy."
        type:
          type: string
    HabitPatchRequestFields:
      type: object
      properties:
        commonData:
          $ref: "#/components/schemas/SchedulePolicyCommonDataPatchRequestFields"
        eventMatcher:
          nullable: true
          allOf:

    ReclaimRecurrence:
      required:
      - frequency
      type: object
      properties:
        interval:
          type: integer
          description: "Repeat interval: 1 means every, 2 means every other, 3 means\
            \ every 3rd. Defaults to 1."
          format: int32
        frequency:
          description: "How often the event recurs: DAILY, WEEKLY, MONTHLY, or YEARLY"
          allOf:
          - $ref: "#/components/schemas/RecurrenceFrequency"
        days:
          type: array
          description: "Days of the week for WEEKLY frequency (e.g. MONDAY, WEDNESDAY,\
            \ FRIDAY)"
          items:
            $ref: "#/components/schemas/DayOfWeek"
        monthlyDay:
          description: Day of the month for MONTHLY frequency
          nullable: true
          allOf:
          - $ref: "#/components/schemas/MonthlyDay"
        yearlyDay:
          description: Day of the year for YEARLY frequency
          nullable: true
          allOf:
          - $ref: "#/components/schemas/YearlyDay"
        until:
          type: string
          description: "When the recurrence ends (yyyy-MM-ddTHH:mm:ssZ format, e.g.\
            \ 2026-06-30T23:59:59Z). Mutually exclusive with count. Omit for no end\
            \ date."
          format: date-time
        count:
          type: integer
          description: Total number of occurrences. Mutually exclusive with until.
            Omit for no end date.
          format: int32
        valid:
          type: boolean
      description: |-
        Recurrence pattern for a recurring event.
        - frequency is always required
        - For WEEKLY: days is required (which days of the week)
        - For MONTHLY: monthlyDay is required (which day of the month)
        - For YEARLY: yearlyDay is required (which day of the year)
        - interval defaults to 1 (every occurrence)
        - Optionally set count or until to limit occurrences

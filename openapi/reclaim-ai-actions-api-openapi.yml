                type: string
components:
  schemas:
    PlannerActionIntermediateResult:
      required:
      - events
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        taskOrHabit:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/TaskOrHabit'
        timeoutReached:
          type: boolean
          nullable: true
        userInfoMessage:
          type: string
          nullable: true
    AssistStatus:
      type: string
      enum:
      - CONTROLLED
      - RELEASED
      - ARCHIVED
    EventAttendee:
      required:
      - email
      type: object
      properties:
        email:
          type: string
        self:
          type: boolean
          nullable: true
        displayName:
          type: string
          nullable: true
        responseStatus:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ResponseStatus'
        comment:
          type: string
          nullable: true
        optional:
          type: boolean
          nullable: true
        additionalGuests:
          type: integer
          format: int32
          nullable: true
        organizer:
          type: boolean
          nullable: true
        resource:
          type: boolean
          nullable: true
    EventSourceDetails:
      required:
      - base64Id
      - calendarId
      - description
      - etag
      - eventId
      - eventKey
      - title
      - url
      - writable
      type: object
      properties:
        writable:
          type: boolean
        calendarId:
          type: integer
          format: int64
        eventId:
          type: string
        etag:
          type: string
        eventKey:
          $ref: '#/components/schemas/EventKey'
        base64Id:
          type: string
        url:
          type: string
        title:
          type: string
        description:
          type: string
    TaskOrHabit:
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/AssistType'
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
        recurringAssignmentType:
          $ref: '#/components/schemas/RecurringAssignmentType'
        alwaysPrivate:
          type: boolean
        title:
          type: string
        eventSubType:
          $ref: '#/components/schemas/EventSubType'
        eventCategory:
          $ref: '#/components/schemas/EventCategory'
        eventColor:
          $ref: '#/components/schemas/EventColor'
        invitees:
          type: array
          items:
            $ref: '#/components/schemas/ThinPerson'
        defendedDescription:
          type: string
        additionalDescription:
          type: string
        priority:
          $ref: '#/components/schemas/PriorityLevel'
        location:
          type: string
      discriminator:
        propertyName: type
        mapping:
          TASK: '#/components/schemas/Task'
          CUSTOM_DAILY: '#/components/schemas/DailyHabit'
      allOf:
      - $ref: '#/components/schemas/Prioritizable'
      - $ref: '#/components/schemas/Snoozeable'
      - $ref: '#/components/schemas/FlexibleTimeSpan'
      - $ref: '#/components/schemas/LogContext'
    GoogleCalendarEventMetadata:
      required:
      - guestsCanInviteOthers
      - guestsCanModify
      - guestsCanSeeOtherGuests
      type: object
      properties:
        guestsCanModify:
          type: boolean
        guestsCanInviteOthers:
          type: boolean
        guestsCanSeeOtherGuests:
          type: boolean
    EventKey:
      required:
      - calendarId
      - eventId
      type: object
      properties:
        eventId:
          type: string
        calendarId:
          type: integer
          format: int64
    EventSubType:
      type: string
      enum:
      - ONE_ON_ONE
      - STAFF_MEETING
      - OP_REVIEW
      - EXTERNAL
      - IDEATION
      - FOCUS
      - PRODUCTIVITY
      - TRAVEL
      - FLIGHT
      - TRAIN
      - RECLAIM
      - VACATION
      - HEALTH
      - ERRAND
      - OTHER_PERSONAL
      - UNKNOWN
    Prioritizable:
      type: object
      properties:
        priority:
          $ref: '#/components/schemas/PriorityLevel'
        priorityUntil:
          type: string
          format: date
      discriminator:
        propertyName: prioritizableType
        mapping:
          HABIT: '#/components/schemas/DailyHabit'
          TASK: '#/components/schemas/Task'
          ONE_ON_ONE: '#/components/schemas/RecurringOneOnOne'
    NotificationKeyRequest:
      type: object
      properties:
        notificationKey:
          maxLength: 200
          pattern: '[A-Za-z0-9_-]+'
          type: string
          nullable: true
    MergeDetails:
      required:
      - key
      - sourceCalendarId
      - sourceReclaimCalendarId
      - type
      type: object
      properties:
        key:
          type: string
        type:
          $ref: '#/components/schemas/MergeDetails.EventType'
        sourceCalendarId:
          type: string
          nullable: true
        sourceReclaimCalendarId:
          type: integer
          format: int64
          nullable: true
    EventResponseStatus:
      type: string
      enum:
      - None
      - Organizer
      - Accepted
      - Declined
      - TentativelyAccepted
      - NotResponded
      x-enum-varnames:
      - None
      - Organizer
      - Accepted
      - Declined
      - TentativelyAccepted
      - NotResponded
    Event:
      required:
      - allocatedTimeChunks
      - assist
      - calendarId
      - categoryOverride
      - description
      - etag
      - eventEnd
      - eventId
      - eventStart
      - key
      - location
      - meetingType
      - organizer
      - priority
      - recurrence
      - recurrenceMax
      - recurringEventId
      - requiresTravel
      - rsvpStatus
      - sourceDetails
      - status
      - subType
      - timeChunks
      - title
      - titleSeenByOthers
      - type
      - updated
      type: object
      properties:
        googleMetadata:
          description: Returns Google Calendar-specific metadata that doesn't fit into a common event model, but that services and UI might be interested in introspecting. If the event isn't a Google Calendar event, this method will return an empty value.
          nullable: true
          allOf:
          - $ref: '#/components/schemas/GoogleCalendarEventMetadata'
        schedulingLinkId:
          type: string
          nullable: true
        schedulingLinkMeetingId:
          type: string
          nullable: true
        underAssistControl:
          type: boolean
        assist:
          $ref: '#/components/schemas/AssistDetails'
        reclaimEventType:
          $ref: '#/components/schemas/ReclaimEventType'
        personalSync:
          type: boolean
        reclaimManaged:
          type: boolean
          description: Reclaim likely created and manages this event but important to note that this event might not be organized by this user so very important to check also [isReclaimManagedAndSelfOrganized](#isReclaimManagedAndSelfOrganized) if the calling class would do something different for a Reclaim managed event if the person attached to this event is an attendee, rather than the organizer.
        reclaimManagedAndSelfOrganized:
          type: boolean
          description: Important to note that there are Reclaim "managed" events like smart meetings and scheduling link events where the user associated with the event is *not* the organizer, and as a result, we may need to do things like color coding or scoring.
        eventId:
          type: string
        calendarId:
          type: integer
          format: int64
        key:
          $ref: '#/components/schemas/EventKey'
        priority:
          $ref: '#/components/schemas/PriorityLevel'
        prioritySource:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/PrioritySource'
        title:
          type: string
        titleSeenByOthers:
          type: string
        location:
          type: string
        onlineMeetingUrlRaw:
          type: string
        onlineMeetingUrl:
          type: string
        description:
          type: string
        descriptionOmitted:
          type: boolean
        titleTruncated:
          type: boolean
        sourceDetails:
          $ref: '#/components/schemas/EventSourceDetails'
        mergeDetails:
          $ref: '#/components/schemas/MergeDetails'
        status:
          $ref: '#/components/schemas/EventStatus'
        published:
          type: boolean
        type:
          $ref: '#/components/schemas/EventType'
        subType:
          $ref: '#/components/schemas/EventSubType'
        meetingType:
          $ref: '#/components/schemas/MeetingType'
        categoryOverride:
          $ref: '#/components/schemas/EventCategory'
        eventStart:
          type: string
          format: date-time
        eventEnd:
          type: string
          format: date-time
        timeChunks:
          type: integer
          format: int32
        allocatedTimeChunks:
          type: integer
          format: int32
        recurringEventId:
          type: string
        updated:
          type: string
          format: date-time
        recurringException:
          type: boolean
        recurrence:
          type: string
        recurrenceMax:
          type: string
          format: date-time
        recurring:
          type: boolean
        recurringInstance:
          type: boolean
        private:
          type: boolean
        public:
          type: boolean
        color:
          $ref: '#/components/schemas/EventColor'
        organizer:
          type: string
        numAttendees:
          type: integer
          format: int32
        attendees:
          type: array
          items:
            $ref: '#/components/schemas/EventAttendee'
        free:
          type: boolean
        category:
          $ref: '#/components/schemas/EventCategory'
        rsvpStatus:
          $ref: '#/components/schemas/EventResponseStatus'
        requiresTravel:
          type: boolean
        conferenceCall:
          type: boolean
        etag:
          type: string
          nullable: true
        smartSeriesId:
          type: integer
          format: int64
          nullable: true
        sourceEventType:
          $ref: '#/components/schemas/PlatformEventType'
        version:
          type: string
        manuallyStarted:
          type: boolean
        inheritedExternalId:
          type: string
          description: 'Retrieves the inherited external ID for the event. The inherited external ID is used in scenarios where a non-pipeline user is invited to an event created by Reclaim on a pipeline user''s Microsoft calendar.


            In such cases, the inherited external ID represents the "external-id" of the organizer''s event,

            which is crucial for supporting event ID parsing. This mechanism ensures compatibility with Reclaim''s

            existing logic for detecting and parsing event information, even when the event ID cannot be directly

            relied upon (e.g., in Microsoft calendars).'
          nullable: true
    EventColor:

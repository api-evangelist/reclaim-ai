components:
  schemas:
    RecurrenceContinuityData:
      type: object
      properties:
        lastPendingSync:
          type: string
          format: date-time
          nullable: true
        successorExternalId:
          type: string
          nullable: true
    EventSourceDetails:
      required:
      - base64Id
      - calendarId
      - description
      - etag
      - eventId
      - eventKey
      - title
      - url
      - writable
      type: object
      properties:
        writable:
          type: boolean
        calendarId:
          type: integer
          format: int64
        eventId:
          type: string
        etag:
          type: string
        eventKey:
          $ref: '#/components/schemas/EventKey'
        base64Id:
          type: string
        url:
          type: string
        title:
          type: string
        description:
          type: string
    EventKey:
      required:
      - calendarId
      - eventId
      type: object
      properties:
        eventId:
          type: string
        calendarId:
          type: integer
          format: int64
    SchedulePolicyType:
      type: string
      enum:
      - AttendeeAvailabilityWarningPolicy
      - BasicEventWarningPolicy
      - BufferEventPolicy
      - EventConflictPolicy
      - FocusTimePolicy
      - HabitPolicy
      - LacksRsvpPolicy
      - LacksVideoConferencePolicy
      - ManagedEventSchedulingPolicy
      - ShieldsUpPolicy
      - SmartMeetingPolicy
      - UNKNOWN
      x-enum-varnames:
      - AttendeeAvailabilityWarningPolicy
      - BasicEventWarningPolicy
      - BufferEventPolicy
      - EventConflictPolicy
      - FocusTimePolicy
      - HabitPolicy
      - LacksRsvpPolicy
      - LacksVideoConferencePolicy
      - ManagedEventSchedulingPolicy
      - ShieldsUpPolicy
      - SmartMeetingPolicy
      - UNKNOWN
    VersionData:
      type: object
      properties:
        syncStatus:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/SyncStatus'
        ceVersion:
          type: integer
          format: int32
          nullable: true
    TaskId:
      required:
      - id
      type: object
      properties:
        id:
          type: integer
          format: int64
        type:
          type: string
    SchedulingLinkId:
      required:
      - id
      type: object
      properties:
        id:
          type: string
        type:
          type: string
    MergeableEventView.MergeType:
      type: string
      enum:
      - ORGANIZER_EVENT
      - ATTENDEE_EVENT
      - SYNC_EVENT
    MergeDetails:
      required:
      - key
      - sourceCalendarId
      - sourceReclaimCalendarId
      - type
      type: object
      properties:
        key:
          type: string
        type:
          $ref: '#/components/schemas/MergeDetails.EventType'
        sourceCalendarId:
          type: string
          nullable: true
        sourceReclaimCalendarId:
          type: integer
          format: int64
          nullable: true
    SipEntryPoint:
      required:
      - uri
      type: object
      properties:
        uri:
          type: string
        label:
          type: string
          nullable: true
        passcode:
          type: string
          nullable: true
        type:
          type: string
    ReclaimRecurrence:
      required:
      - frequency
      type: object
      properties:
        interval:
          type: integer
          description: 'Repeat interval: 1 means every, 2 means every other, 3 means every 3rd. Defaults to 1.'
          format: int32
        frequency:
          description: 'How often the event recurs: DAILY, WEEKLY, MONTHLY, or YEARLY'
          allOf:
          - $ref: '#/components/schemas/RecurrenceFrequency'
        days:
          type: array
          description: Days of the week for WEEKLY frequency (e.g. MONDAY, WEDNESDAY, FRIDAY)
          items:
            $ref: '#/components/schemas/DayOfWeek'
        monthlyDay:
          description: Day of the month for MONTHLY frequency
          nullable: true
          allOf:
          - $ref: '#/components/schemas/MonthlyDay'
        yearlyDay:
          description: Day of the year for YEARLY frequency
          nullable: true
          allOf:
          - $ref: '#/components/schemas/YearlyDay'
        until:
          type: string
          description: When the recurrence ends (yyyy-MM-ddTHH:mm:ssZ format, e.g. 2026-06-30T23:59:59Z). Mutually exclusive with count. Omit for no end date.
          format: date-time
        count:
          type: integer
          description: Total number of occurrences. Mutually exclusive with until. Omit for no end date.
          format: int32
        valid:
          type: boolean
      description: 'Recurrence pattern for a recurring event.

        - frequency is always required

        - For WEEKLY: days is required (which days of the week)

        - For MONTHLY: monthlyDay is required (which day of the month)

        - For YEARLY: yearlyDay is required (which day of the year)

        - interval defaults to 1 (every occurrence)

        - Optionally set count or until to limit occurrences'
    MeetConferenceData:
      required:
      - conferenceUrl
      - entryPoints
      type: object
      properties:
        conferenceUrl:
          type: string
        entryPoints:
          type: array
          items:
            $ref: '#/components/schemas/ConferenceEntryPoint'
        type:
          type: string
    ConferenceData:
      type: object
      discriminator:
        propertyName: type
        mapping:
          MeetConferenceData: '#/components/schemas/MeetConferenceData'
          TeamsConferenceData: '#/components/schemas/TeamsConferenceData'
          ZoomConferenceData: '#/components/schemas/ZoomConferenceData'
          PendingConferenceData: '#/components/schemas/PendingConferenceData'
      oneOf:
      - $ref: '#/components/schemas/MeetConferenceData'
      - $ref: '#/components/schemas/TeamsConferenceData'

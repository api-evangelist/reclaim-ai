openapi: 3.0.1
info:
  title: Reclaim account-time-schemes resources API
  description: Reclaim's awesome API
  contact:
    name: Reclaim.ai Inc.
    url: http://reclaim.ai
    email: info@reclaim.ai
  license:
    name: Reclaim 9.9
    url: http://reclaim.ai
  version: '0.1'
tags:
- name: resources
paths:
  /api/resources:
    get:
      tags:
      - resources
      operationId: getResources
      parameters:
      - name: user
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/User'
      responses:
        '200':
          description: getResources 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resources'
      security:
      - Authorization: []

      enum:
      - MONDAY
      - TUESDAY
      - WEDNESDAY
      - THURSDAY
      - FRIDAY
      - SATURDAY
      - SUNDAY
    ConnectedAccountPayload:
      required:
      - accountName
      type: object
      properties:
        accountName:
          type: string
    AdventureSetting:
      required:
      - complete
      type: object
      properties:
        complete:
          type: boolean
    AssistNotificationSettings:
      required:

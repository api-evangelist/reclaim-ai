openapi: 3.0.1
info:
  title: Reclaim account-time-schemes Admin API
  description: Reclaim's awesome API
  contact:
    name: Reclaim.ai Inc.
    url: http://reclaim.ai
    email: info@reclaim.ai
  license:
    name: Reclaim 9.9
    url: http://reclaim.ai
  version: '0.1'
tags:
- name: Admin
paths:
  /api/admin/users:
    post:
      operationId: admin_createUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPayload'
        required: true
      responses:
        '200':
          description: admin_createUser 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserView'
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
  /api/admin/users/{username}:
    delete:
      operationId: admin_deleteUser
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: admin_deleteUser 200 response
          content:
            application/json:
              schema:
                type: object
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
  /api/admin/users/{username}/accounts:
    get:
      operationId: admin_listAccounts
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: admin_listAccounts 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConnectedAccount'
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
    post:
      operationId: admin_createAccount
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConnectedAccountPayload'
        required: true
      responses:
        '200':
          description: admin_createAccount 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectedAccount'
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
  /api/admin/users/{username}/accounts/{accountId}/main:
    post:
      operationId: admin_switchMainAccount
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: accountId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: admin_switchMainAccount 200 response
          content:
            application/json:
              schema:
                type: object
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
  /api/admin/users/{username}/calendar-syncs:
    get:
      operationId: admin_getCalendarSyncs
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: admin_getCalendarSyncs 200 response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CalendarSync'
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
    post:
      operationId: admin_createCalendarSync
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCalendarSyncRequest'
        required: true
      responses:
        '200':
          description: admin_createCalendarSync 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarSync'
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
  /api/admin/users/{username}/calendar-syncs/{sourceId}/to/{targetId}:
    delete:
      operationId: admin_deleteSync
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: sourceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: targetId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: admin_deleteSync 200 response
          content:
            application/json:
              schema:
                type: object
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
    patch:
      operationId: admin_patchSync
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: sourceId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: targetId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
        required: true
      responses:
        '200':
          description: admin_patchSync 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalendarSync'
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
  /api/admin/users/{username}/orgMetadata:
    patch:
      operationId: admin_patchOrgMetadata
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgMetadata'
        required: true
      responses:
        '200':
          description: admin_patchOrgMetadata 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
      security:
      - Authorization:
        - ROLE_API
      tags:
      - Admin
components:
  schemas:
    DefaultRsvpAvailability:
      type: object
      properties:
        treatNeedsActionRsvpAs:
          $ref: '#/components/schemas/AvailabilityType'
    SchedulingWindowWeeks:
      type: string
      enum:
      - ONE
      - TWO
      - THREE
      - FOUR
      - FIVE
      - SIX
      - SEVEN
      - EIGHT
      - NINE
      - TEN
      - ELEVEN
      - TWELVE
    UserView:
      required:
      - email
      - mainAccountId
      - name
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        mainAccountId:
          type: integer
          format: int64
    WebhookSettings:
      type: object
      properties:
        enabled:
          type: boolean
        all:
          $ref: '#/components/schemas/WebhookSettings'
    UserInterests:
      type: object
      properties:
        tasks:
          type: boolean
        priorities:
          type: boolean
        office365:
          type: boolean
        calendar:
          type: boolean
        asana:
          type: boolean
        trello:
          type: boolean
        todoist:
          type: boolean
        jira:
          type: boolean
        linear:
          type: boolean
        clickup:
          type: boolean
        monday:
          type: boolean
        MSTeams:
          type: boolean
    AvailabilitySettings:
      type: object
      properties:
        redisCacheEnabled:
          type: boolean
    UserProfileDepartment:
      type: string
      enum:
      - PRODUCT
      - ENGINEERING
      - SUPPORT
      - MARKETING
      - SALES
      - DESIGN
      - HR
      - OPERATIONS
      - ACCOUNTING_AND_FINANCE
      - FOUNDER
      - EXECUTIVE_ASSISTANT
      - IT_SECURITY
      - OTHER
      x-deprecated:
      - OTHER
    CapabilityStatus:
      type: string
      enum:
      - GRANTED
      - PARTIAL
      - NOT_GRANTED
    Colorized:
      type: object
      properties:
        color:
          $ref: '#/components/schemas/EventColor'
    UserPayload:
      required:
      - email
      - orgMetadata
      type: object
      properties:
        email:
          type: string
        name:
          type: string
          nullable: true
        givenName:
          type: string
          nullable: true
        familyName:
          type: string
          nullable: true
        externalId:
          type: string
          nullable: true
        orgMetadata:
          $ref: '#/components/schemas/OrgMetadata'
    CapabilityInfo:
      required:
      - status
      type: object
      properties:
        status:
          $ref: '#/components/schemas/CapabilityStatus'
        oauthURI:
          type: string
          format: uri
          nullable: true
    TaskAutoWorkflowSettings:
      type: object
      properties:
        category:
          $ref: '#/components/schemas/TaskAutoWorkflowType'
        durationToWaitInDays:
          type: integer
          format: int32
    EventType:
      type: string
      enum:
      - MEETING
      - WORK
      - LOGISTICS
      - PERSONAL
    AsanaSettings:
      type: object
      properties:
        enabled:
          type: boolean
    TimezonePreference:
      type: string
      enum:
      - USE_PRIMARY_CALENDAR_TZ
      - USE_RECLAIM_TZ
    ConnectedAccountType:
      type: string
      enum:
      - GOOGLE
      - MICROSOFT
    UserProvisioningDetails:
      required:
      - hasTeamProvisionedMetadata
      type: object
      properties:
        hasTeamProvisionedMetadata:
          type: boolean
    ImmutableCollection_CalendarView_:
      type: object
      allOf:
      - $ref: '#/components/schemas/AbstractCollection_CalendarView_'
      - properties:
          empty:
            type: boolean
          partialView:
            type: boolean
    UserMetadataUsecase:
      type: string
      enum:
      - EDUCATION
      - WORK
      - NON_PROFIT
      - TEAM
      - SOLO_WORK
      - PERSONAL
      x-deprecated:
      - EDUCATION
      - NON_PROFIT
    ExperimentalSettings:
      type: object
      properties:
        treatOptionalSmartMeetingAttendeesAsFree:
          type: boolean
        lookAheadForSmartMeetingIdealDayOnWeeklyMeetings:
          type: boolean
    PrioritiesSettings:
      type: object
      properties:
        enabled:
          type: boolean
    EventDisplayPreferences:
      required:
      - attribution
      - busyEmoji
      - description
      - doneEmoji
      - freeEmoji
      - lockEmoji
      - prefix
      - progressEmoji
      - warningEmoji
      type: object
      properties:
        progressEmoji:
          type: boolean
        lockEmoji:
          type: boolean
        freeEmoji:
          type: boolean
        busyEmoji:
          type: boolean
        doneEmoji:
          type: boolean
        warningEmoji:
          type: boolean
        description:
          type: boolean
        attribution:
          type: boolean
        prefix:
          type: boolean
    SchedulingWindowWeeksOverride:
      type: string
      enum:
      - ONE
      - TWO
      - THREE
      - FOUR
      - FIVE
      - SIX
      - SEVEN
      - EIGHT
      - NINE
      - TEN
      - ELEVEN
      - TWELVE
    UserAccountLock.AccountLockType:

        lineageId:
          type: integer
          format: int64
        calendarId:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/SmartSeriesType'
        status:
          $ref: '#/components/schemas/SmartSeriesStatus'
        activeSeries:
          $ref: '#/components/schemas/SmartSeriesView'
        series:
          type: array
          items:
            $ref: '#/components/schemas/SmartSeriesView'
        periods:
          type: array
          items:
            $ref: '#/components/schemas/SmartSeriesPeriodView'
        enabled:
          type: boolean
        restorable:
          type: boolean
        recurrenceType:
          $ref: '#/components/schemas/SmartSeriesRecurrenceType'
    EventKey:
      required:
      - calendarId
      - eventId
      type: object
      properties:
        eventId:
          type: string
        calendarId:
          type: integer
          format: int64

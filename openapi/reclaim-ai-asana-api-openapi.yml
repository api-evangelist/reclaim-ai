                type: object
    options:
      tags:
      - asana
      operationId: taskDetailsPreflight
      parameters:
      - name: asanaTaskId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: taskDetailsPreflight 200 response
          content:
            application/json:
              schema:
                type: object
  /web/asana/widget:
    get:
      tags:
      - asana
      summary: Called on-render of a task inside of Asana for tasks that have NOT already been associated with / scheduled in Reclaim.
      description: Called on-render of a task inside of Asana for tasks that have NOT already been associated with / scheduled in Reclaim.
      operationId: widget
      parameters:
      - name: x-asana-request-signature
        in: header
        required: true
        schema:
          type: string
      - name: workspace
        in: query
        required: true
        schema:
          type: string
      - name: task
        in: query
        required: true
        schema:
          type: string
      - name: user
        in: query
        required: true
        schema:
          type: string
      - name: attachment
        in: query
        required: true
        schema:
          type: string
      - name: expires_at
        in: query
        schema:
          type: string
          nullable: true
      responses:
        '200':
          description: widget 200 response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsanaWidgetMetadata'
    options:
      tags:
      - asana
      operationId: widgetPreflight
      responses:
        '200':
          description: widgetPreflight 200 response
          content:
            application/json:
              schema:
                type: object

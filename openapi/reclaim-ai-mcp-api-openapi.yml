      - Mcp
  /api/mcp/{subpath}/.well-known/oauth-protected-resource:
    get:
      operationId: mcpSubProtectedResource
      parameters:
      - name: subpath
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: mcpSubProtectedResource 200 response
          content:
            application/json:
              schema:
                type: object
      tags:
      - Mcp
  /api/mcp/{subpath}/.well-known/openid-configuration:
    get:
      operationId: mcpSubOpenidConfiguration
      parameters:
      - name: subpath
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: mcpSubOpenidConfiguration 200 response
          content:

        - isAuthenticated()
        - isAnonymous()
      tags:
      - Mcp
  /api/mcp/{subpath1}/{subpath2}/.well-known/oauth-authorization-server:
    get:
      operationId: mcpSub2Oauth2Metadata
      parameters:
      - name: subpath1
        in: path
        required: true
        schema:
          type: string
      - name: subpath2

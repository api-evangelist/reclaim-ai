terms:
  - term: Task
    definition: >
      A work item with a time estimate that Reclaim auto-schedules into available
      calendar slots before a due date. Supports priority, snooze, and integration
      sync from Asana, Jira, Linear, ClickUp, Todoist, and Notion.
    schema: Task
    tag: tasks

  - term: Habit
    definition: >
      A recurring event template (e.g. daily exercise, lunch, deep work block)
      that Reclaim automatically protects on the calendar. Habits flex around
      meetings while maintaining target durations and frequency.
    tag: smart-habits

  - term: SmartMeeting
    definition: >
      A meeting scheduling object that allows Reclaim to find optimal times across
      all attendees' calendars, respecting focus blocks and travel buffers.
    tag: smart-meetings

  - term: Event
    definition: >
      A calendar event, either external (synced from Google/Outlook) or
      Reclaim-managed (task block, habit, focus time, meeting).
    schema: Event
    tag: events

  - term: Calendar
    definition: >
      A Google Calendar or Outlook calendar account connected to Reclaim for
      reading availability and writing managed events.
    schema: Calendar
    tag: calendars

  - term: FocusTime
    definition: >
      Automatically scheduled blocks of uninterrupted deep-work time that Reclaim
      protects based on user focus preferences.
    tag: focus-settings

  - term: SchedulePolicy
    definition: >
      Rules controlling what hours of the day and days of the week Reclaim may
      schedule tasks, habits, and meetings.
    schema: SchedulePolicy
    tag: schedule-policy

  - term: TimePolicy
    definition: >
      Allocation limits defining the maximum and minimum time Reclaim should
      spend on categories of work within a time horizon.
    schema: TimePolicy
    tag: timePolicies

  - term: TimeScheme
    definition: >
      A named configuration of work hours, focus hours, and meeting hours
      representing a desired work pattern.
    tag: time-scheme

  - term: Webhook
    definition: >
      A registered HTTP endpoint that Reclaim calls when scheduling state changes,
      such as task updates, habit completions, or calendar syncs.
    tag: webhooks

  - term: Analytics
    definition: >
      Aggregated focus-time, meeting-load, and productivity metrics at the user
      and team level with configurable time windows.
    tag: analytics

  - term: OneOnOne
    definition: >
      A recurring 1-on-1 meeting series between two users managed by Reclaim,
      automatically rescheduled when conflicts arise.
    tag: oneOnOnes

  - term: Interaction
    definition: >
      A recorded user action (accept, decline, snooze) on a Reclaim scheduling
      recommendation, used to improve future suggestions.
    schema: Interaction
    tag: interactions

  - term: Credential
    definition: >
      Stored OAuth credentials for a third-party service (Asana, Jira, Slack, etc.)
      connected to a Reclaim user account.
    schema: Credential
    tag: credentials

  - term: BuildingLocation
    definition: >
      A physical office location used to schedule in-person meetings and
      compute travel time between events.
    tag: buildings

  - term: DelegatedAccess
    definition: >
      A grant allowing one user (the delegate) to manage scheduling on behalf
      of another user within an organization.
    tag: delegated-access

  - term: OOOCalendar
    definition: >
      Out-of-office calendar entry indicating unavailability, used by Reclaim
      to block scheduling during planned absences.
    tag: ooo-calendars

  - term: APIKey
    definition: >
      A long-lived API key issued through the api-management endpoints, used
      as an alternative to OAuth 2.0 bearer tokens.
    tag: api-management
